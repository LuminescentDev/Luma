name: Release Please

on:
  push:
    branches: [main]
    paths-ignore:
      - "apps/website/**"
      - "services/**"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-22.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

  build:
    name: Build release (${{ matrix.platform }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
          - platform: linux
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev pkg-config

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/luma-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security list-keychains -d user -s "$keychain_path" login.keychain-db
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$keychain_path"

          signing_identity="$(
            security find-identity -v -p codesigning "$keychain_path" |
              sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' |
              head -n 1
          )"

          if [ -z "$signing_identity" ]; then
            echo "Developer ID Application identity was not found"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Prepare Apple notarization credentials
        if: matrix.platform == 'macos'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$api_key_path"
          chmod 600 "$api_key_path"

          echo "APPLE_API_KEY=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Inject release updater configuration
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'apps/desktop/src-tauri/tauri.conf.json';
          const publicKey = process.env.TAURI_UPDATER_PUBLIC_KEY;
          const endpoint = process.env.TAURI_UPDATER_ENDPOINT;
          if (!publicKey) {
            throw new Error('TAURI_UPDATER_PUBLIC_KEY repository variable is required');
          }
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.plugins.updater.pubkey = publicKey;
          config.plugins.updater.endpoints = [endpoint];
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build and upload signed release artifacts
        uses: tauri-apps/tauri-action@v1
        timeout-minutes: 45
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseDraft: true
          retryAttempts: 2
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --verbose

      - name: Notarize and staple macOS DMG
        if: matrix.platform == 'macos'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"

          if [ -z "$dmg_path" ]; then
            echo "Expected macOS DMG artifact was not found"
            exit 1
          fi

          submission_output="$(mktemp)"
          notarytool_exit=0
          xcrun notarytool submit "$dmg_path" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait | tee "$submission_output" || notarytool_exit=$?

          submission_status="$(sed -n 's/^[[:space:]]*status: //p' "$submission_output" | tail -n 1)"
          echo "Notarization status: ${submission_status:-<none>}"

          if [ "$notarytool_exit" -ne 0 ] || [ "$submission_status" != "Accepted" ]; then
            submission_id="$(sed -n 's/^[[:space:]]*id: //p' "$submission_output" | head -n 1)"
            if [ -n "$submission_id" ]; then
              echo "Notarization failed (exit=$notarytool_exit, status=${submission_status:-<none>}), fetching log for submission $submission_id"
              xcrun notarytool log "$submission_id" \
                --key "$APPLE_API_KEY_PATH" \
                --key-id "$APPLE_API_KEY" \
                --issuer "$APPLE_API_ISSUER" || true
            fi
            rm -f "$submission_output"
            exit 1
          fi
          rm -f "$submission_output"

          xcrun stapler staple "$dmg_path"

          gh release upload "${{ needs.release-please.outputs.tag_name }}" "$dmg_path" --clobber

      - name: Verify macOS signing and notarization
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          app_path="$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          dmg_path="$(find apps/desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"

          if [ -z "$app_path" ] || [ -z "$dmg_path" ]; then
            echo "Expected macOS app and DMG artifacts were not found"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -dv --verbose=4 "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"

  checksums:
    name: Generate release checksums
    needs: [release-please, build]
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release assets
        run: |
          mkdir release-assets
          gh release download "${RELEASE_TAG}" --dir release-assets

      - name: Verify updater metadata and signatures
        shell: bash
        run: |
          test -f release-assets/latest.json
          compgen -G 'release-assets/*.sig' > /dev/null

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          (
            cd release-assets
            for artifact in *; do
              if [ -f "${artifact}" ]; then
                sha256sum "${artifact}"
              fi
            done
          ) > SHA256SUMS
          test -s SHA256SUMS

      - name: Upload checksums and publish release
        run: |
          gh release upload "${RELEASE_TAG}" SHA256SUMS --clobber
          gh release edit "${RELEASE_TAG}" --draft=false --latest
